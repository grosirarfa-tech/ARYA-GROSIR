<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arya Grosir - Premium POS System</title>
    <!-- FontAwesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #080808;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Disesuaikan untuk tampilan mobile/pos card */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER SECTION --- */
        header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            height: 70px;
            object-fit: contain;
        }

        .header-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .system-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00e676;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #00e676;
            border-radius: 50%;
            box-shadow: 0 0 8px #00e676;
        }

        .btn-home {
            background-color: transparent;
            border: 1px solid #d48806;
            color: #ff9800;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .datetime {
            color: #8c8c8c;
            font-size: 0.75rem;
            text-align: right;
            line-height: 1.3;
            font-family: monospace;
        }

        /* --- MENU GRID SECTION --- */
        .menu-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .menu-card {
            background: linear-gradient(145deg, #141414, #0d0d0d);
            border: 1px solid #1f1f1f;
            border-radius: 20px;
            padding: 22px 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            height: 130px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .menu-card:active {
            transform: scale(0.97);
            border-color: #333;
        }

        .icon-box {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .menu-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* --- WARNA SKEMA IKON --- */
        .icon-belanja { background-color: rgba(63, 81, 181, 0.15); color: #7986cb; }
        .icon-penjualan { background-color: rgba(255, 152, 0, 0.15); color: #ffb74d; }
        .icon-stok { background-color: rgba(33, 150, 243, 0.15); color: #64b5f6; }
        .icon-perkiraan { background-color: rgba(156, 39, 176, 0.15); color: #ba68c8; }
        .icon-pengeluaran { background-color: rgba(0, 188, 212, 0.15); color: #4dd0e1; }
        .icon-keuntungan { background-color: rgba(233, 30, 99, 0.15); color: #f06292; }
        .icon-faktur { background-color: rgba(255, 193, 7, 0.15); color: #ffd54f; }
        .icon-sinkronisasi { background-color: rgba(76, 175, 80, 0.15); color: #81c784; }

    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-container">
                <!-- Pastikan file logo web arya.png berada di folder yang sama di GitHub -->
                <img src="logo web arya.png" alt="Arya Grosir Logo">
            </div>
            
            <div class="header-bar">
                <div class="system-title">
                    <span class="dot"></span>
                    <span>PREMIUM POS<br>SYSTEM</span>
                </div>

                <button class="btn-home">
                    <i class="fa-solid fa-house"></i> HOME
                </button>

                <div class="datetime" id="datetime">
                    Loading...
                </div>
            </div>
        </header>

        <!-- Grid Menu Utama -->
        <main class="menu-grid">
            
            <div class="menu-card" onclick="navigateTo('belanja')">
                <div class="icon-box icon-belanja">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
                <div class="menu-title">Belanja<br>Barang</div>
            </div>

            <div class="menu-card" onclick="navigateTo('penjualan')">
                <div class="icon-box icon-penjualan">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <div class="menu-title">Penjualan</div>
            </div>

            <div class="menu-card" onclick="navigateTo('stok')">
                <div class="icon-box icon-stok">
                    <i class="fa-solid fa-cubes"></i>
                </div>
                <div class="menu-title">Stok<br>Barang</div>
            </div>

            <div class="menu-card" onclick="navigateTo('perkiraan')">
                <div class="icon-box icon-perkiraan">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div class="menu-title">Perkiraan<br>Belanja</div>
            </div>

            <div class="menu-card" onclick="navigateTo('pengeluaran')">
                <div class="icon-box icon-pengeluaran">
                    <i class="fa-solid fa-receipt"></i>
                </div>
                <div class="menu-title">Pengeluaran<br>Lain</div>
            </div>

            <div class="menu-card" onclick="navigateTo('keuntungan')">
                <div class="icon-box icon-keuntungan">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div class="menu-title">Keuntungan</div>
            </div>

            <div class="menu-card" onclick="navigateTo('faktur')">
                <div class="icon-box icon-faktur">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                </div>
                <div class="menu-title">Pengaturan<br>Faktur</div>
            </div>

            <div class="menu-card" onclick="navigateTo('sinkronisasi')">
                <div class="icon-box icon-sinkronisasi">
                    <i class="fa-solid fa-rotate"></i>
                </div>
                <div class="menu-title">Sinkronisasi</div>
            </div>

        </main>
    </div>

    <script>
        // Fungsi Update Tanggal & Waktu Realtime
        function updateDateTime() {
            const now = new Date();
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            const day = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const formatted = `${day} ${month} ${year} pukul<br>${hours}.${minutes}.${seconds}`;
            document.getElementById('datetime').innerHTML = formatted;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Fungsi Navigasi Sederhana
        function navigateTo(menu) {
            alert('Membuka menu: ' + menu.toUpperCase() + ' (Akan dikembangkan di step selanjutnya)');
        }
    </script>
</body>
</html>
