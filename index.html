<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Transaksi & Input Data</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-section {
            border: 1px solid #e0e0e0;
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }

        .form-section h3 {
            margin-top: 0;
            color: #007bff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Styling khusus input date agar mudah diklik */
        input[type="date"] {
            cursor: pointer;
            position: relative;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        button:hover {
            background-color: #218838;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Input Transaksi & Data</h2>

    <!-- FORM PENJUALAN -->
    <div class="form-section">
        <h3>1. Form Penjualan</h3>
        <form id="formPenjualan">
            <div class="grid-2">
                <div class="form-group">
                    <label for="tanggalPenjualan">Tanggal Transaksi:</label>
                    <input type="date" class="auto-date" id="tanggalPenjualan" name="tanggal_penjualan" required>
                </div>
                <div class="form-group">
                    <label for="namaPelanggan">Nama Pelanggan:</label>
                    <input type="text" id="namaPelanggan" placeholder="Umum / Nama Pelanggan">
                </div>
            </div>
            <div class="form-group">
                <label for="totalPenjualan">Total Rp:</label>
                <input type="number" id="totalPenjualan" placeholder="0">
            </div>
            <button type="button">Simpan Penjualan</button>
        </form>
    </div>

    <!-- FORM BELANJA / PEMBELIAN -->
    <div class="form-section">
        <h3>2. Form Belanja Barang</h3>
        <form id="formBelanja">
            <div class="grid-2">
                <div class="form-group">
                    <label for="tanggalBelanja">Tanggal Belanja:</label>
                    <input type="date" class="auto-date" id="tanggalBelanja" name="tanggal_belanja" required>
                </div>
                <div class="form-group">
                    <label for="namaSupplier">Supplier / Toko:</label>
                    <input type="text" id="namaSupplier" placeholder="Nama Supplier">
                </div>
            </div>
            <div class="form-group">
                <label for="totalBelanja">Total Belanja Rp:</label>
                <input type="number" id="totalBelanja" placeholder="0">
            </div>
            <button type="button">Simpan Belanja</button>
        </form>
    </div>

    <!-- FORM BARANG BARU -->
    <div class="form-section">
        <h3>3. Form Input Barang Baru</h3>
        <form id="formBarangBaru">
            <div class="grid-2">
                <div class="form-group">
                    <label for="tanggalBarangMasuk">Tanggal Masuk:</label>
                    <input type="date" class="auto-date" id="tanggalBarangMasuk" name="tanggal_masuk" required>
                </div>
                <div class="form-group">
                    <label for="kodeBarcode">Kode / Barcode:</label>
                    <input type="text" id="kodeBarcode" placeholder="Scan / Ketik Barcode">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="namaBarang">Nama Barang:</label>
                    <input type="text" id="namaBarang" placeholder="Nama Barang">
                </div>
                <div class="form-group">
                    <label for="stokBarang">Jumlah Stok:</label>
                    <input type="number" id="stokBarang" placeholder="0">
                </div>
            </div>
            <button type="button">Tambah Barang</button>
        </form>
    </div>

    <!-- FORM PENGELUARAN LAIN-LAIN -->
    <div class="form-section">
        <h3>4. Form Input Pengeluaran</h3>
        <form id="formPengeluaran">
            <div class="grid-2">
                <div class="form-group">
                    <label for="tanggalPengeluaran">Tanggal Pengeluaran:</label>
                    <input type="date" class="auto-date" id="tanggalPengeluaran" name="tanggal_pengeluaran" required>
                </div>
                <div class="form-group">
                    <label for="jenisPengeluaran">Kategori / Jenis:</label>
                    <input type="text" id="jenisPengeluaran" placeholder="Misal: Listrik, Plastik, Gaji">
                </div>
            </div>
            <div class="form-group">
                <label for="jumlahPengeluaran">Nominal Rp:</label>
                <input type="number" id="jumlahPengeluaran" placeholder="0">
            </div>
            <button type="button">Simpan Pengeluaran</button>
        </form>
    </div>
</div>

<script>
    // Fungsi untuk mendapatkan tanggal hari ini dalam format YYYY-MM-DD (format standar HTML input type="date")
    function getTodayDateString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // Fungsi otomatis mengisi semua elemen bertipe input date yang memiliki class "auto-date"
    function setAllInputsToToday() {
        const dateInputs = document.querySelectorAll('.auto-date');
        const todayStr = getTodayDateString();

        dateInputs.forEach(input => {
            // Set nilai default ke tanggal hari ini jika belum terisi
            if (!input.value) {
                input.value = todayStr;
            }

            // Memastikan picker kalender terbuka saat area input diklik
            input.addEventListener('click', function() {
                if ('showPicker' in HTMLInputElement.prototype) {
                    try {
                        this.showPicker();
                    } catch (e) {
                        // Fallback jika pemanggilan showPicker diblokir browser
                    }
                }
            });
        });
    }

    // Jalankan fungsi saat halaman selesai dimuat (DOM ready)
    document.addEventListener('DOMContentLoaded', setAllInputsToToday);
</script>

</body>
</html>
